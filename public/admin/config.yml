backend:
  name: github
  repo: gilanx04/blog
  branch: main
  base_url: https://gilanx-decap-oauth.glng.workers.dev
  auth_endpoint: auth

local_backend: true

media_folder: src/content/posts
public_folder: .

collections:
  - name: posts
    label: Tulisan
    label_singular: Tulisan
    folder: src/content/posts
    path: "{{fields.slug}}/index"
    identifier_field: slug
    media_folder: ""
    public_folder: ""
    create: true
    extension: md
    format: frontmatter
    slug: "{{fields.slug}}"
    summary: "{{title}} - {{published}}"
    fields:
      - label: Judul
        name: title
        widget: string
      - label: Slug URL
        name: slug
        widget: string
        pattern:
          - "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          - "Gunakan huruf kecil, angka, dan tanda hubung. Contoh: copy-fail-exploit-4-byte-ke-page-cache"
      - label: Tanggal terbit
        name: published
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
      - label: Terakhir diubah
        name: updated
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        required: false
      - label: Ringkasan
        name: description
        widget: text
        required: false
      - label: Gambar sampul
        name: image
        widget: image
        required: false
      - label: Tag
        name: tags
        widget: list
        required: false
      - label: Kategori
        name: category
        widget: string
        required: false
      - label: Bahasa
        name: lang
        widget: select
        required: false
        options:
          - { label: Ikuti bahasa situs, value: "" }
          - { label: Indonesia, value: id }
          - { label: Inggris, value: en }
      - label: Penulis
        name: author
        widget: string
        required: false
      - label: Link sumber
        name: sourceLink
        widget: string
        required: false
      - label: Nama lisensi
        name: licenseName
        widget: string
        required: false
      - label: URL lisensi
        name: licenseUrl
        widget: string
        required: false
      - label: Simpan sebagai draft
        name: draft
        widget: boolean
        default: false
        required: false
      - label: Sematkan tulisan
        name: pinned
        widget: boolean
        default: false
        required: false
      - label: Aktifkan komentar
        name: comment
        widget: boolean
        default: true
        required: false
      - label: Password
        name: password
        widget: string
        required: false
      - label: Petunjuk password
        name: passwordHint
        widget: string
        required: false
      - label: Isi tulisan
        name: body
        widget: markdown
