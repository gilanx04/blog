<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
	<title id="title">Firefly inspired blog cover</title>
	<desc id="desc">Soft layered hills with small glowing firefly dots.</desc>
	<defs>
		<linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#e9f7ff" />
			<stop offset="0.52" stop-color="#f6f0ff" />
			<stop offset="1" stop-color="#fff8de" />
		</linearGradient>
		<linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#83d6cc" />
			<stop offset="1" stop-color="#62b3ca" />
		</linearGradient>
		<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
			<feGaussianBlur stdDeviation="8" result="blur" />
			<feMerge>
				<feMergeNode in="blur" />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>
	</defs>
	<rect width="1200" height="675" fill="url(#sky)" />
	<circle cx="980" cy="132" r="72" fill="#fff3a6" opacity="0.88" filter="url(#glow)" />
	<path d="M0 456c140-86 263-80 370-12 92 58 186 58 286 8 164-82 340-72 544 56v167H0z" fill="#bce8dd" opacity="0.9" />
	<path d="M0 530c158-98 328-100 510-6 122 62 245 62 370 0 106-52 212-54 320-8v159H0z" fill="url(#hill)" />
	<path d="M88 380c118-26 216-20 294 18 84 40 178 40 282 0 144-56 290-48 438 24" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.45" stroke-linecap="round" />
	<g filter="url(#glow)">
		<circle cx="180" cy="176" r="5" fill="#fff7a8" />
		<circle cx="294" cy="246" r="4" fill="#fff7a8" />
		<circle cx="472" cy="146" r="5" fill="#fff7a8" />
		<circle cx="706" cy="218" r="4" fill="#fff7a8" />
		<circle cx="842" cy="316" r="5" fill="#fff7a8" />
		<circle cx="1056" cy="266" r="4" fill="#fff7a8" />
	</g>
</svg>
